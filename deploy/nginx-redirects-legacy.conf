# =============================================================================
#  NOTA: os redirects 301 das URLs legadas NAO ficam aqui.
#
#  O frontend do CodeCraft roda na HOSTINGER com APACHE (.htaccess), nao no
#  nginx do VPS. Portanto os redirects 301 das URLs legadas da Comunidade Craft
#  (desafios, ranking, mentoria, feedbacks, crafter, onboarding) foram
#  configurados em:
#
#      hostinger/public_html.htaccess   (secao "Redirects 301 de URLs legadas")
#
#  Esse .htaccess e versionado e enviado automaticamente pelo deploy.py.
#
#  Este arquivo permanece apenas como referencia caso, no futuro, o frontend
#  passe a ser servido por nginx. Nesse cenario, use os blocos abaixo dentro
#  do server { } que atende codecraftgenz.com.br, antes do location / { }:
#
#      location ~ ^/(desafios|ranking|mentoria|feedbacks|onboarding)(/.*)?$ { return 301 /; }
#      location ~ ^/crafter(/.*)?$ { return 301 /; }
#
#      sudo nginx -t && sudo systemctl reload nginx
# =============================================================================
