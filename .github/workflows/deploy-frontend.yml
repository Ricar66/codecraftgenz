# =============================================
# CodeCraft Gen-Z - Deploy Frontend
# =============================================
# Trigger: push para main com mudancas em src/, public/, index.html,
#          vite.config.*, ou package.json
# =============================================

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'

env:
  NODE_VERSION: '20'

jobs:
  # =============================================
  # Build
  # =============================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # =============================================
  # Deploy via FTP para Hostinger
  # =============================================
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          server-dir: ${{ secrets.HOSTINGER_FTP_PATH }}
          local-dir: dist/
          protocol: ftps
          port: 21

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy Frontend - codecraftgenz.com.br"
          description: "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
          username: "GitHub Actions"

# Secrets necessarios (configurar em Settings > Secrets > Actions do repo):
#   HOSTINGER_FTP_HOST   — Hostname FTP do Hostinger (ex: ftp.codecraftgenz.com.br)
#   HOSTINGER_FTP_USER   — Usuario FTP do Hostinger
#   HOSTINGER_FTP_PASS   — Senha FTP do Hostinger
#   HOSTINGER_FTP_PATH   — Caminho remoto no servidor (ex: /public_html/)
#   DISCORD_WEBHOOK_URL  — Webhook URL do canal de notificacoes do Discord
